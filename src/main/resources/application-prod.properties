# Database connection ? uses DB_URL env var, falls back to Aiven
spring.datasource.url=${DB_URL:jdbc:mysql://mysql-1c1ffb9c-jnm-2f7c.g.aivencloud.com:27480/papsexamms?useSSL=true&requireSSL=true&verifyServerCertificate=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool ? increase since local MySQL has no connection limits
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

server.port=${PORT:8080}

jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

# Allow requests from frontend
spring.web.cors.allowed-origins=https://papsxms-frontend.vercel.app,http://localhost:3000,http://172.16.0.180:8088,https://papsxms.somwaki.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*

spring.thymeleaf.check-template-location=false